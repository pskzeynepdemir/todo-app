<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yapılacaklar Listesi</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Giriş / kayıt ekranı -->
  <div class="app" id="auth-view" hidden>
    <h1>Yapılacaklar</h1>
    <p class="subtitle" id="auth-subtitle">Devam etmek için giriş yap</p>

    <form id="auth-form" class="auth-form">
      <input type="email" id="email" placeholder="E-posta" autocomplete="email" required />
      <input type="password" id="password" placeholder="Parola (en az 6 karakter)" autocomplete="current-password" minlength="6" required />
      <button type="submit" id="auth-submit">Giriş yap</button>
    </form>

    <p class="auth-toggle">
      <span id="auth-toggle-text">Hesabın yok mu?</span>
      <button type="button" id="auth-toggle-btn">Kayıt ol</button>
    </p>

    <p class="auth-message" id="auth-message"></p>
  </div>

  <!-- Uygulama ekranı (kanban panosu) -->
  <div id="app-view" hidden>
    <header class="board-header">
      <div class="board-title">
        <h1>Yapılacaklar</h1>
        <span class="subtitle" id="user-email"></span>
      </div>
      <div class="board-tools">
        <div class="filters">
          <button class="filter active" data-filter="all">Tümü</button>
          <button class="filter" data-filter="active">Aktif</button>
          <button class="filter" data-filter="completed">Tamamlanan</button>
        </div>
        <button id="logout" class="logout">Çıkış</button>
      </div>
    </header>

    <div class="board" id="board"></div>

    <!-- Kart ve sütun şablonları JS tarafından kullanılır -->
  </div>

  <!-- Yükleniyor durumu -->
  <div class="app loading" id="loading-view">Yükleniyor…</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
